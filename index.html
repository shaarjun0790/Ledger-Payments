<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ledger — Payment Tracker</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#20261D">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Ledger">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F6F4EC;
    --card: #FFFFFF;
    --ink: #20261D;
    --ink-soft: #6B7364;
    --rule: #DCD6C6;
    --rule-light: #EDE9DC;
    --overdue: #A73B2A;
    --soon: #B8862A;
    --ok: #3F6B4F;
    --overdue-bg: #F6E4DF;
    --soon-bg: #F6EAD6;
    --ok-bg: #E3ECE3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--rule-light) 1px, transparent 1px);
    background-size: 100% 44px;
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    padding:32px 20px 80px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* Header */
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 6px;
  }
  h1{
    font-family:'Courier Prime', monospace;
    font-weight:700;
    font-size:34px;
    letter-spacing:0.01em;
    margin:0 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 24px;
  }

  /* Summary strip */
  .summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    border:1px solid var(--rule);
    background:var(--card);
    margin-bottom:22px;
  }
  .summary .cell{
    padding:16px 18px;
    border-right:1px solid var(--rule);
  }
  .summary .cell:last-child{border-right:none;}
  .summary .cell .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .summary .cell .value{
    font-family:'Courier Prime', monospace;
    font-size:22px;
    font-weight:700;
  }
  .summary .cell.warn .value{color:var(--overdue);}

  /* Toolbar */
  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .toolbar h2{
    font-family:'Courier Prime', monospace;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:0;
    color:var(--ink-soft);
  }
  button{
    font-family:'IBM Plex Sans', sans-serif;
    cursor:pointer;
    border:none;
  }
  .btn-add{
    background:var(--ink);
    color:var(--card);
    padding:10px 16px;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
  }
  .btn-add:hover{background:#3a4433;}

  /* Entry rows */
  .entries{display:flex;flex-direction:column;gap:10px;}
  .entry{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--card);
    border:1px solid var(--rule);
    padding:14px 18px;
  }
  .stamp{
    flex:0 0 auto;
    width:56px;height:56px;
    border-radius:50%;
    border:2px solid currentColor;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(-7deg);
    font-family:'Courier Prime', monospace;
    font-weight:700;
    text-align:center;
    line-height:1.05;
  }
  .stamp::before{
    content:"";
    position:absolute;
    inset:4px;
    border-radius:50%;
    border:1px dashed currentColor;
    opacity:0.55;
  }
  .stamp span{
    font-size:12px;
    letter-spacing:0.02em;
  }
  .stamp.overdue{color:var(--overdue);background:var(--overdue-bg);}
  .stamp.soon{color:var(--soon);background:var(--soon-bg);}
  .stamp.ok{color:var(--ok);background:var(--ok-bg);}

  .entry-main{flex:1 1 auto;min-width:0;}
  .entry-name{
    font-weight:600;
    font-size:15px;
    margin-bottom:3px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:2px 7px;
    border:1px solid var(--rule);
    color:var(--ink-soft);
    border-radius:3px;
  }
  .filter-bar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }
  .filter-pill{
    background:var(--card);
    border:1px solid var(--rule);
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding:6px 12px;
    border-radius:999px;
  }
  .filter-pill:hover{border-color:var(--ink);color:var(--ink);}
  .filter-pill.active{
    background:var(--ink);
    color:var(--card);
    border-color:var(--ink);
  }
  .entry-meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .entry-amount{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:17px;
    flex:0 0 auto;
    min-width:78px;
    text-align:right;
  }
  .entry-actions{
    flex:0 0 auto;
    display:flex;
    gap:8px;
  }
  .icon-btn{
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--rule);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    padding:8px 10px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .icon-btn:hover{border-color:var(--ink);color:var(--ink);}
  .icon-btn.paid:hover{border-color:var(--ok);color:var(--ok);}
  .icon-btn.del:hover{border-color:var(--overdue);color:var(--overdue);}

  /* Empty state */
  .empty{
    border:1px dashed var(--rule);
    background:var(--card);
    padding:40px 24px;
    text-align:center;
    color:var(--ink-soft);
  }
  .empty h3{
    font-family:'Courier Prime', monospace;
    color:var(--ink);
    margin:0 0 8px;
  }
  .empty p{margin:0 0 16px;font-size:14px;}

  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(32,38,29,0.4);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px;
    overflow-y:auto;
    z-index:10;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--card);
    border:1px solid var(--rule);
    width:100%;
    max-width:420px;
    padding:26px;
  }
  .modal h3{
    font-family:'Courier Prime', monospace;
    margin:0 0 18px;
    font-size:19px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  .field input, .field select{
    width:100%;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    padding:9px 10px;
    border:1px solid var(--rule);
    background:#fff;
    color:var(--ink);
  }
  .field input:focus, .field select:focus{
    outline:2px solid var(--ink);
    outline-offset:1px;
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:20px;
  }
  .btn-secondary{
    background:transparent;
    border:1px solid var(--rule);
    padding:10px 16px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .btn-secondary:hover{border-color:var(--ink);color:var(--ink);}

  .foot-reset{
    text-align:center;
    margin-top:30px;
  }
  .foot-reset button{
    background:none;
    color:var(--ink-soft);
    font-size:12px;
    text-decoration:underline;
    font-family:'IBM Plex Mono', monospace;
  }

  @media (max-width:560px){
    .summary{grid-template-columns:1fr;}
    .summary .cell{border-right:none;border-bottom:1px solid var(--rule);}
    .summary .cell:last-child{border-bottom:none;}
    .entry{flex-wrap:wrap;}
    .entry-amount{order:3;margin-left:72px;}
    .entry-actions{order:4;margin-left:72px;margin-top:6px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Your bills, on record</p>
  <h1>The Ledger</h1>
  <p class="sub">Every loan repayment and direct debit, stamped and tracked.</p>

  <div class="summary">
    <div class="cell">
      <div class="label">Monthly outgoing</div>
      <div class="value" id="sumMonthly">$0</div>
    </div>
    <div class="cell">
      <div class="label">Due next 7 days</div>
      <div class="value" id="sumSoon">$0</div>
    </div>
    <div class="cell warn">
      <div class="label">Overdue</div>
      <div class="value" id="sumOverdue">0</div>
    </div>
  </div>

  <div class="toolbar">
    <h2 id="entriesTitle">Entries</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="icon-btn" id="enableNotif">🔔 Enable notifications</button>
      <button class="icon-btn" id="exportIcs">📅 Export to calendar</button>
      <button class="btn-add" id="openAdd">+ Add payment</button>
    </div>
  </div>

  <div id="loading" style="color:var(--ink-soft);font-size:13px;">Loading your ledger…</div>
  <div class="filter-bar" id="filterBar" style="display:none;"></div>
  <div class="entries" id="entries" style="display:none;"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <h3>Nothing on record yet</h3>
    <p>Add your first loan repayment or direct debit to start tracking due dates.</p>
    <button class="btn-add" id="openAddEmpty">+ Add payment</button>
  </div>

  <div class="foot-reset">
    <button id="resetAll">Clear all data</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Add a payment</h3>
    <input type="hidden" id="editId">
    <div class="field">
      <label for="fName">Name</label>
      <input id="fName" type="text" placeholder="e.g. Car loan, Netflix">
    </div>
    <div class="row2">
      <div class="field">
        <label for="fAmount">Amount ($)</label>
        <input id="fAmount" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="field">
        <label for="fCategory">Category</label>
        <select id="fCategory"></select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="fFrequency">Repeats</label>
        <select id="fFrequency">
          <option value="weekly">Weekly</option>
          <option value="monthly" selected>Monthly</option>
          <option value="annually">Annually</option>
          <option value="once">One-off</option>
        </select>
      </div>
      <div class="field">
        <label for="fDueDate">Next due date</label>
        <input id="fDueDate" type="date">
      </div>
    </div>
    <div class="field">
      <label for="fRemind">Remind me</label>
      <select id="fRemind">
        <option value="0">On the due date</option>
        <option value="1" selected>1 day before</option>
        <option value="2">2 days before</option>
        <option value="3">3 days before</option>
        <option value="5">5 days before</option>
        <option value="7">7 days before</option>
        <option value="14">14 days before</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelModal">Cancel</button>
      <button class="btn-add" id="saveEntry">Save entry</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'payments';
const CATEGORIES_KEY = 'categories';
const DEFAULT_CATEGORIES = ['Loan', 'Subscription', 'Utility', 'Other'];
const CATEGORY_PALETTE = ['#3F6B4F', '#B8862A', '#5B7CA3', '#A73B2A', '#7A5C99', '#4E7C7C', '#8C5A3C', '#6A6A3D'];

let payments = [];
let categories = [];
let editingId = null;
let activeFilter = 'all';

const entriesEl = document.getElementById('entries');
const emptyEl = document.getElementById('emptyState');
const loadingEl = document.getElementById('loading');
const overlay = document.getElementById('overlay');
const filterBarEl = document.getElementById('filterBar');

function todayDateOnly(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function parseDateOnly(str){
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDateOnly(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function formatDisplayDate(d){
  return d.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
}

function daysUntil(d){
  const t = todayDateOnly();
  return Math.round((d - t) / 86400000);
}

function addInterval(date, frequency){
  const d = new Date(date);
  if(frequency === 'weekly'){
    d.setDate(d.getDate() + 7);
  } else if(frequency === 'monthly'){
    d.setMonth(d.getMonth() + 1);
  } else if(frequency === 'annually'){
    d.setFullYear(d.getFullYear() + 1);
  }
  return d;
}

function monthlyEquivalent(p){
  if(p.frequency === 'weekly') return p.amount * 4.348;
  if(p.frequency === 'monthly') return p.amount;
  if(p.frequency === 'annually') return p.amount / 12;
  return 0; // one-off doesn't count toward recurring monthly total
}

function currency(n){
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function loadPayments(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    payments = result && result.value ? JSON.parse(result.value) : [];
  }catch(e){
    payments = [];
  }
  // Migration: fill in defaults for entries saved before reminders existed
  payments.forEach(p => {
    if(p.remindDaysBefore === undefined || p.remindDaysBefore === null){
      p.remindDaysBefore = 1;
    }
    if(p.category){
      p.category = p.category.charAt(0).toUpperCase() + p.category.slice(1);
    }
  });
}

async function savePayments(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(payments), false);
  }catch(e){
    console.error('Could not save ledger', e);
  }
}

async function loadCategories(){
  try{
    const result = await window.storage.get(CATEGORIES_KEY, false);
    categories = result && result.value ? JSON.parse(result.value) : [...DEFAULT_CATEGORIES];
  }catch(e){
    categories = [...DEFAULT_CATEGORIES];
  }
  // Make sure any category already used by a payment is in the list
  payments.forEach(p => {
    if(p.category && !categories.includes(p.category)){
      categories.push(p.category);
    }
  });
}

async function saveCategories(){
  try{
    await window.storage.set(CATEGORIES_KEY, JSON.stringify(categories), false);
  }catch(e){
    console.error('Could not save categories', e);
  }
}

function categoryColor(category){
  const idx = categories.indexOf(category);
  return CATEGORY_PALETTE[(idx < 0 ? 0 : idx) % CATEGORY_PALETTE.length];
}

function populateCategorySelect(selected){
  const sel = document.getElementById('fCategory');
  sel.innerHTML = '';
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
  const newOpt = document.createElement('option');
  newOpt.value = '__new__';
  newOpt.textContent = '+ Add new category…';
  sel.appendChild(newOpt);
  sel.value = selected && categories.includes(selected) ? selected : categories[0];
}

document.getElementById('fCategory').addEventListener('change', (e) => {
  if(e.target.value === '__new__'){
    const name = prompt('New category name:');
    const trimmed = name ? name.trim() : '';
    if(trimmed){
      if(!categories.includes(trimmed)) categories.push(trimmed);
      populateCategorySelect(trimmed);
      saveCategories();
    } else {
      populateCategorySelect(categories[0]);
    }
  }
});

function renderFilterBar(){
  if(categories.length === 0 || payments.length === 0){
    filterBarEl.style.display = 'none';
    return;
  }
  filterBarEl.style.display = 'flex';
  const usedCategories = categories.filter(c => payments.some(p => p.category === c));
  filterBarEl.innerHTML = '';
  const allPill = document.createElement('button');
  allPill.className = 'filter-pill' + (activeFilter === 'all' ? ' active' : '');
  allPill.textContent = 'All';
  allPill.dataset.filter = 'all';
  filterBarEl.appendChild(allPill);
  usedCategories.forEach(c => {
    const pill = document.createElement('button');
    pill.className = 'filter-pill' + (activeFilter === c ? ' active' : '');
    pill.textContent = c;
    pill.dataset.filter = c;
    filterBarEl.appendChild(pill);
  });
}

filterBarEl.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-filter]');
  if(!btn) return;
  activeFilter = btn.dataset.filter;
  render();
});

function render(){
  loadingEl.style.display = 'none';

  if(payments.length === 0){
    entriesEl.style.display = 'none';
    emptyEl.style.display = 'block';
  } else {
    entriesEl.style.display = 'flex';
    emptyEl.style.display = 'none';
  }

  renderFilterBar();

  const filtered = activeFilter === 'all' ? payments : payments.filter(p => p.category === activeFilter);

  // Sort by days until due, ascending
  const sorted = [...filtered].sort((a,b) => {
    return daysUntil(parseDateOnly(a.dueDate)) - daysUntil(parseDateOnly(b.dueDate));
  });

  entriesEl.innerHTML = '';
  let monthlyTotal = 0;
  let soonTotal = 0;
  let overdueCount = 0;

  payments.forEach(p => { monthlyTotal += monthlyEquivalent(p); });

  sorted.forEach(p => {
    const due = parseDateOnly(p.dueDate);
    const diff = daysUntil(due);

    let stampClass, stampLabel;
    if(diff < 0){
      stampClass = 'overdue';
      stampLabel = 'LATE';
      overdueCount++;
    } else if(diff === 0){
      stampClass = 'soon';
      stampLabel = 'TODAY';
      soonTotal += p.amount;
    } else if(diff <= 7){
      stampClass = 'soon';
      stampLabel = diff + 'D';
      soonTotal += p.amount;
    } else {
      stampClass = 'ok';
      stampLabel = diff + 'D';
    }

    const tagColor = categoryColor(p.category);
    const row = document.createElement('div');
    row.className = 'entry';
    row.innerHTML = `
      <div class="stamp ${stampClass}"><span>${stampLabel}</span></div>
      <div class="entry-main">
        <div class="entry-name">${escapeHtml(p.name)} <span class="tag" style="border-color:${tagColor};color:${tagColor};">${escapeHtml(p.category)}</span></div>
        <div class="entry-meta">Due ${formatDisplayDate(due)} · ${p.frequency === 'once' ? 'one-off' : p.frequency} · reminder ${p.remindDaysBefore == 0 ? 'on due date' : p.remindDaysBefore + 'd before'}</div>
      </div>
      <div class="entry-amount">${currency(p.amount)}</div>
      <div class="entry-actions">
        <button class="icon-btn paid" data-action="paid" data-id="${p.id}">Mark paid</button>
        <button class="icon-btn" data-action="edit" data-id="${p.id}">Edit</button>
        <button class="icon-btn del" data-action="del" data-id="${p.id}">Delete</button>
      </div>
    `;
    entriesEl.appendChild(row);
  });

  document.getElementById('sumMonthly').textContent = currency(monthlyTotal);
  document.getElementById('sumSoon').textContent = currency(soonTotal);
  document.getElementById('sumOverdue').textContent = overdueCount;
  document.getElementById('entriesTitle').textContent = `Entries (${filtered.length})`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function openModal(entry){
  editingId = entry ? entry.id : null;
  document.getElementById('modalTitle').textContent = entry ? 'Edit payment' : 'Add a payment';
  document.getElementById('fName').value = entry ? entry.name : '';
  document.getElementById('fAmount').value = entry ? entry.amount : '';
  populateCategorySelect(entry ? entry.category : categories[0]);
  document.getElementById('fFrequency').value = entry ? entry.frequency : 'monthly';
  document.getElementById('fDueDate').value = entry ? entry.dueDate : formatDateOnly(todayDateOnly());
  document.getElementById('fRemind').value = entry ? String(entry.remindDaysBefore) : '1';
  overlay.classList.add('open');
  document.getElementById('fName').focus();
}

function closeModal(){
  overlay.classList.remove('open');
  editingId = null;
}

document.getElementById('openAdd').addEventListener('click', () => openModal(null));
document.getElementById('openAddEmpty').addEventListener('click', () => openModal(null));
document.getElementById('cancelModal').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

document.getElementById('saveEntry').addEventListener('click', async () => {
  const name = document.getElementById('fName').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  let category = document.getElementById('fCategory').value;
  const frequency = document.getElementById('fFrequency').value;
  const dueDate = document.getElementById('fDueDate').value;
  const remindDaysBefore = parseInt(document.getElementById('fRemind').value, 10);

  if(category === '__new__'){
    alert('Please finish adding your new category first, or pick an existing one.');
    return;
  }

  if(!name || isNaN(amount) || amount < 0 || !dueDate){
    alert('Please fill in a name, a valid amount, and a due date.');
    return;
  }

  if(editingId){
    const idx = payments.findIndex(p => p.id === editingId);
    if(idx !== -1){
      payments[idx] = {...payments[idx], name, amount, category, frequency, dueDate, remindDaysBefore};
    }
  } else {
    payments.push({
      id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name, amount, category, frequency, dueDate, remindDaysBefore
    });
  }

  await savePayments();
  render();
  closeModal();
});

entriesEl.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action]');
  if(!btn) return;
  const id = btn.dataset.id;
  const action = btn.dataset.action;
  const p = payments.find(x => x.id === id);
  if(!p) return;

  if(action === 'edit'){
    openModal(p);
  } else if(action === 'del'){
    if(confirm(`Delete "${p.name}"?`)){
      payments = payments.filter(x => x.id !== id);
      await savePayments();
      render();
    }
  } else if(action === 'paid'){
    if(p.frequency === 'once'){
      payments = payments.filter(x => x.id !== id);
    } else {
      const nextDate = addInterval(parseDateOnly(p.dueDate), p.frequency);
      p.dueDate = formatDateOnly(nextDate);
    }
    await savePayments();
    render();
  }
});

document.getElementById('resetAll').addEventListener('click', async () => {
  if(confirm('Clear all saved payments? This cannot be undone.')){
    payments = [];
    await savePayments();
    render();
  }
});

(async function init(){
  await loadPayments();
  await loadCategories();
  render();
  registerServiceWorker();
  checkAndNotify();
})();

function registerServiceWorker(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./service-worker.js').catch((e) => {
      console.log('Service worker not registered (this is expected if opened as a local file):', e);
    });
  }
}

document.getElementById('enableNotif').addEventListener('click', async () => {
  if(!('Notification' in window)){
    alert('Your browser does not support notifications.');
    return;
  }
  const perm = await Notification.requestPermission();
  if(perm === 'granted'){
    new Notification('The Ledger', { body: 'Notifications enabled. You\'ll be alerted for anything due soon.' });
    checkAndNotify(true);
  } else if(perm === 'denied'){
    alert('Notifications were blocked. You can re-enable them in your browser or phone settings.');
  }
});

async function getNotifiedLog(){
  try{
    const result = await window.storage.get('notified_log', false);
    return result && result.value ? JSON.parse(result.value) : {};
  }catch(e){
    return {};
  }
}

async function saveNotifiedLog(log){
  try{
    await window.storage.set('notified_log', JSON.stringify(log), false);
  }catch(e){
    console.error('Could not save notification log', e);
  }
}

async function checkAndNotify(force){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const log = await getNotifiedLog();
  let changed = false;

  for(const p of payments){
    const due = parseDateOnly(p.dueDate);
    const diff = daysUntil(due);
    const threshold = (p.remindDaysBefore === undefined || p.remindDaysBefore === null) ? 1 : p.remindDaysBefore;
    if(diff <= threshold){
      const key = p.id;
      if(force || log[key] !== p.dueDate){
        let statusText = diff < 0 ? 'is overdue' : diff === 0 ? 'is due today' : `is due in ${diff} day${diff === 1 ? '' : 's'}`;
        new Notification('Payment ' + statusText, {
          body: `${p.name} — ${currency(p.amount)}`,
          icon: './icon-192.png'
        });
        log[key] = p.dueDate;
        changed = true;
      }
    }
  }
  if(changed) await saveNotifiedLog(log);
}

function pad(n){ return String(n).padStart(2,'0'); }

function icsDate(d){
  return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate());
}

function icsFrequency(freq){
  if(freq === 'weekly') return 'WEEKLY';
  if(freq === 'monthly') return 'MONTHLY';
  if(freq === 'annually') return 'YEARLY';
  return null;
}

function buildIcs(){
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//The Ledger//Payment Tracker//EN',
    'CALSCALE:GREGORIAN'
  ];

  const stamp = icsDate(new Date()) + 'T000000Z';

  payments.forEach(p => {
    const due = parseDateOnly(p.dueDate);
    const remindDays = (p.remindDaysBefore === undefined || p.remindDaysBefore === null) ? 1 : p.remindDaysBefore;
    lines.push('BEGIN:VEVENT');
    lines.push('UID:' + p.id + '@theledger.local');
    lines.push('DTSTAMP:' + stamp);
    lines.push('DTSTART;VALUE=DATE:' + icsDate(due));
    lines.push('DTEND;VALUE=DATE:' + icsDate(due));
    const rrule = icsFrequency(p.frequency);
    if(rrule) lines.push('RRULE:FREQ=' + rrule);
    lines.push('SUMMARY:' + p.name + ' — ' + currency(p.amount) + ' due');
    lines.push('DESCRIPTION:' + p.category + ' payment tracked in The Ledger');
    lines.push('BEGIN:VALARM');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:Reminder');
    lines.push('TRIGGER:' + (remindDays === 0 ? 'PT0S' : '-P' + remindDays + 'D'));
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

document.getElementById('exportIcs').addEventListener('click', () => {
  if(payments.length === 0){
    alert('Add a payment first, then export it to your calendar.');
    return;
  }
  const ics = buildIcs();
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ledger-payments.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
